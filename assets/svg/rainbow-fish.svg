<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Rainbow Fish (mola/sunfish): faces LEFT to match the hand-drawn source.
       Head left = pink heart "lips" + eye upper-left; dorsal fin top, ventral
       fin bottom; right side = red/orange/purple rainbow bands + green forked
       tail. In-game the sprite is mirrored (flipX) when swimming right. (§7.2) -->
  <defs>
    <clipPath id="body"><circle cx="27" cy="33" r="20"/></clipPath>
  </defs>

  <!-- Forked tail (right) -->
  <path d="M45,33 L63,17 L56,28 L63,33 L56,38 L63,49 Z"
        fill="#5EC4BC" stroke="#1A1A1A" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Dorsal fin (top) -->
  <path d="M16,20 L25,2 L33,18 Z" fill="#5EC4BC" stroke="#1A1A1A" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Ventral fin (bottom) -->
  <path d="M18,48 L26,62 L34,47 Z" fill="#5EC4BC" stroke="#1A1A1A" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Heart "lips" / mouth (far left, tip pointing left) -->
  <g transform="translate(0,28) rotate(90 6 5.5)">
    <path d="M6,11 C6,11 0,6.5 0,3 C0,1 1.5,0 3,0 C4.2,0 5.4,0.9 6,2 C6.6,0.9 7.8,0 9,0 C10.5,0 12,1 12,3 C12,6.5 6,11 6,11 Z"
          fill="#E8847C" stroke="#1A1A1A" stroke-width="1.3" stroke-linejoin="round"/>
  </g>

  <!-- Body -->
  <circle cx="27" cy="33" r="20" fill="#5EC4BC" stroke="#1A1A1A" stroke-width="1.8"/>

  <!-- Rainbow bands near the tail (right) + red vertical stripe, clipped to body -->
  <g clip-path="url(#body)">
    <rect x="36" y="12" width="5" height="42" fill="#D94F4F"/>
    <rect x="41" y="12" width="3.5" height="42" fill="#F5A623"/>
    <rect x="44.5" y="12" width="6" height="42" fill="#7B4397"/>
    <path d="M21,13 q-3,20 1,40" fill="none" stroke="#D94F4F" stroke-width="3.2"/>
  </g>

  <!-- Eye (upper-left, by the mouth) -->
  <circle cx="18" cy="27" r="2.8" fill="#1A1A1A"/>
  <circle cx="17" cy="26" r="0.9" fill="#FFFFFF"/>
</svg>
