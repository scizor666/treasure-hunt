<svg xmlns="http://www.w3.org/2000/svg" width="72" height="80" viewBox="0 0 72 80">
  <!-- Mad Octopus: lavender bulbous body, teal dash spots, upward tentacles, toothy mouth facing right (§7.2) -->
  <defs>
    <clipPath id="obody"><path d="M8,40 C8,18 26,10 40,12 C56,14 64,26 64,40 C64,56 50,66 36,66 C20,66 8,58 8,40 Z"/></clipPath>
  </defs>

  <!-- Tentacles (upward + trailing, left side) -->
  <g fill="#B8A0D2" stroke="#7B6BA0" stroke-width="1.2" stroke-linejoin="round">
    <path d="M16,30 C8,18 6,10 10,6 C13,11 16,18 20,26 Z"/>
    <path d="M16,34 C6,28 2,22 3,16 C8,20 13,26 19,31 Z"/>
    <path d="M16,42 C5,42 1,40 -1,34 C5,36 12,38 19,39 Z"/>
    <path d="M18,50 C8,54 3,56 1,52 C7,50 13,47 20,46 Z"/>
    <path d="M22,58 C16,66 12,70 8,68 C12,62 16,56 22,52 Z"/>
  </g>

  <!-- Body -->
  <path d="M8,40 C8,18 26,10 40,12 C56,14 64,26 64,40 C64,56 50,66 36,66 C20,66 8,58 8,40 Z"
        fill="#B8A0D2" stroke="#1A1A1A" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Teal dash spots -->
  <g fill="none" stroke="#5EC4BC" stroke-width="3" stroke-linecap="round">
    <line x1="24" y1="26" x2="26" y2="33"/>
    <line x1="31" y1="24" x2="33" y2="31"/>
    <line x1="22" y1="40" x2="24" y2="47"/>
    <line x1="30" y1="42" x2="32" y2="49"/>
    <line x1="38" y1="40" x2="40" y2="47"/>
  </g>

  <!-- Open toothy mouth (faces right) -->
  <path d="M42,28 L68,18 L70,40 L66,52 L44,48 C40,40 40,34 42,28 Z" fill="#5a2f5a"/>
  <!-- Upper teeth -->
  <path d="M44,29 L68,19 L65,25 L60,22 L57,27 L52,24 L49,29 L46,26 Z" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="0.6" stroke-linejoin="round"/>
  <!-- Lower teeth -->
  <path d="M45,47 L66,51 L63,45 L59,49 L55,44 L51,48 L48,43 Z" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="0.6" stroke-linejoin="round"/>
  <!-- Mouth outline -->
  <path d="M42,28 L68,18 L70,40 L66,52 L44,48" fill="none" stroke="#1A1A1A" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Eye -->
  <circle cx="46" cy="20" r="4.2" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.4"/>
  <circle cx="47" cy="20.5" r="2" fill="#1A1A1A"/>
</svg>
